version: "3.9"

services:
  client_roadside:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: client_roadside
    network_mode: host
    environment:
      CLIENT_ROLE: "roadside"
      DATASET: "${DATASET}"
      AWS_REGION: "${AWS_REGION}"
      S3_BUCKET: "${S3_BUCKET}"
    volumes:
      - ..:/app
      - ~/.aws:/root/.aws:ro
    command: [ "python", "-m", "src.fl.client" ]

  client_vehicle:
    extends: client_roadside
    container_name: client_vehicle
    environment:
      CLIENT_ROLE: "vehicle"

  client_sensor:
    extends: client_roadside
    container_name: client_sensor
    environment:
      CLIENT_ROLE: "sensor"

  client_camera:
    extends: client_roadside
    container_name: client_camera
    environment:
      CLIENT_ROLE: "camera"

  client_bus:
    extends: client_roadside
    container_name: client_bus
    environment:
      CLIENT_ROLE: "bus"
