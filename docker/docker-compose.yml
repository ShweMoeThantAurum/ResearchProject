version: "3.9"

# AEFL Federated Learning: 5 Clients + External Server
# Server runs manually on host: python -m src.fl.server

services:
  client_roadside:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: client_roadside
    network_mode: host
    environment:
      CLIENT_ROLE: "roadside"
      DATASET: "${DATASET}"
      FL_MODE: "${FL_MODE}"
      FL_ROUNDS: "${FL_ROUNDS}"
      BATCH_SIZE: "${BATCH_SIZE}"
      LOCAL_EPOCHS: "${LOCAL_EPOCHS}"
      LR: "${LR}"
      HIDDEN_SIZE: "${HIDDEN_SIZE}"

      DEVICE_POWER_WATTS: "${DEVICE_POWER_WATTS}"
      NET_J_PER_MB: "${NET_J_PER_MB}"

      DP_ENABLED: "${DP_ENABLED}"
      DP_SIGMA: "${DP_SIGMA}"

      COMPRESSION_ENABLED: "${COMPRESSION_ENABLED}"
      COMPRESSION_MODE: "${COMPRESSION_MODE}"
      COMPRESSION_SPARSITY: "${COMPRESSION_SPARSITY}"
      COMPRESSION_K_FRAC: "${COMPRESSION_K_FRAC}"

      AWS_REGION: "${AWS_REGION}"
      S3_BUCKET: "${S3_BUCKET}"

    volumes:
      - ..:/app
      - ~/.aws:/root/.aws:ro
    command: [ "python", "-m", "src.fl.client" ]

  client_vehicle:
    extends: client_roadside
    container_name: client_vehicle
    environment:
      CLIENT_ROLE: "vehicle"

  client_sensor:
    extends: client_roadside
    container_name: client_sensor
    environment:
      CLIENT_ROLE: "sensor"

  client_camera:
    extends: client_roadside
    container_name: client_camera
    environment:
      CLIENT_ROLE: "camera"

  client_bus:
    extends: client_roadside
    container_name: client_bus
    environment:
      CLIENT_ROLE: "bus"
